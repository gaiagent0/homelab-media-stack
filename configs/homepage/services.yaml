---
# Homepage services.yaml
# Docs: https://gethomepage.dev/latest/configs/services/
# All URLs use internal Docker hostnames — works from within the LXC network.

- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:8096
        description: Media server
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true
          enableNowPlaying: true

    - Jellyseerr:
        icon: jellyseerr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:5055
        description: Request manager
        widget:
          type: jellyseerr
          url: http://jellyseerr:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}"

    - Jellystat:
        icon: jellystat.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:3010
        description: Watch statistics

- Downloads:
    - qBittorrent:
        icon: qbittorrent.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:8080
        description: Torrent client (VPN)
        widget:
          type: qbittorrent
          url: http://gluetun:8080
          username: admin
          password: "{{HOMEPAGE_VAR_QBIT_PASSWORD}}"

    - Radarr:
        icon: radarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:7878
        description: Movies
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"

    - Sonarr:
        icon: sonarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:8989
        description: TV shows
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"

    - Lidarr:
        icon: lidarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:8686
        description: Music
        widget:
          type: lidarr
          url: http://lidarr:8686
          key: "{{HOMEPAGE_VAR_LIDARR_API_KEY}}"

    - Prowlarr:
        icon: prowlarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:9696
        description: Indexers
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

    - Bazarr:
        icon: bazarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:6767
        description: Subtitles
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"

- Tools:
    - Tdarr:
        icon: tdarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:8265
        description: Transcode automation

    - Profilarr:
        icon: si-traefikproxy
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:9850
        description: TRaSH quality profiles

    - Wizarr:
        icon: wizarr.png
        href: http://{{HOMEPAGE_VAR_LXC_IP}}:5690
        description: Invite manager
